# ---------------------------------------------------------------------------
# Stromtarif (Awattar = EPEX Spot Deutschland, Tagespreise)
# Rabot basiert ebenfalls auf EPEX Spot → günstige Stunden stimmen überein
# ---------------------------------------------------------------------------
tariffs:
  currency: EUR
  grid:
    type: awattar
    region: de

# ---------------------------------------------------------------------------
# Standort & Batterie-Strategie
# ---------------------------------------------------------------------------
site:
  title: "Solar Zuhause"
  meters:
    grid: grid
    pv: pv
    battery: battery
  residualPower: 0
  # prioritySoc und bufferSoc → in evcc UI unter Einstellungen konfigurieren

# ---------------------------------------------------------------------------
# Ladepunkte
# ---------------------------------------------------------------------------
loadpoints:
  - title: "Wallbox Master"
    charger: wallbox_1_master
    mode: pv
    enable:
      delay: 1m      # 1 Minute Überschuss nötig bevor Laden startet
    disable:
      delay: 5m      # 5 Minuten Pause nötig bevor Laden stoppt

  - title: "Wallbox 2"
    charger: wallbox_2
    mode: pv
    enable:
      delay: 1m
    disable:
      delay: 5m

  - title: "Wallbox Außen"
    charger: wallbox_3_aussen
    mode: pv
    enable:
      delay: 1m
    disable:
      delay: 5m

  - title: "Heizstab L1"
    charger: heizstab_l1
    mode: pv
    enable:
      delay: 1m
    disable:
      delay: 5m

  - title: "Heizstab L2"
    charger: heizstab_l2
    mode: pv
    enable:
      delay: 1m
    disable:
      delay: 5m

  - title: "Heizstab L3"
    charger: heizstab_l3
    mode: pv
    enable:
      delay: 1m
    disable:
      delay: 5m

# ---------------------------------------------------------------------------
# MQTT → Home Assistant Integration
# evcc publisht alle Werte nach Mosquitto; HA kann darauf subscriben
# ---------------------------------------------------------------------------
mqtt:
  broker: localhost:1883
  topic: evcc
  clientid: evcc
