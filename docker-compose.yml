services:
  homeassistant:
    container_name: homeassistant
    image: "homeassistant/home-assistant:stable"
    volumes:
      - /home/home/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    network_mode: host
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8123/api/states/sensor.netzleistung -H 'Authorization: Bearer ${HA_BEARER_TOKEN}' | grep -v 'not_found' | grep -q 'state'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:latest
    volumes:
      - /home/home/homeassistant/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - /home/home/homeassistant/mosquitto/data:/mosquitto/data
      - /home/home/homeassistant/mosquitto/log:/mosquitto/log
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"

  uni-meter:
    container_name: uni-meter
    image: sdeigm/uni-meter:latest
    network_mode: host    # Pflicht für SMA Speedwire Multicast (UDP 9522)
    volumes:
      - /home/home/homeassistant/uni-meter/uni-meter.conf:/etc/uni-meter.conf
    restart: unless-stopped
    depends_on:
      homeassistant:
        condition: service_healthy

  evcc:
    container_name: evcc
    image: evcc/evcc:latest
    network_mode: host    # Pflicht für SMA Speedwire Multicast (UDP 9522)
    volumes:
      - /home/home/homeassistant/evcc/evcc.yaml:/etc/evcc.yaml
      - /home/home/homeassistant/evcc/data:/root/.evcc
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      homeassistant:
        condition: service_healthy
