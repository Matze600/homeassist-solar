- id: heizstab_solar_ein
  alias: "Heizstab EIN bei vollem Akku und PV-Überschuss"
  description: >
    Schaltet Heizstab (Shelly) ein, wenn Batterie >= 90% und PV > 1500W
    für 5 Minuten — dann ist genug Überschuss für den Heizstab (~2kW).
  trigger:
    - platform: numeric_state
      entity_id: sensor.sn_XXXXXXXXXX_battery_soc_total
      above: 90
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: input_boolean.heizstab_automation_aktiv
      state: "on"
    - condition: numeric_state
      entity_id: sensor.pv_gesamtleistung
      above: 1500
    - condition: time
      after: "07:00:00"
      before: "19:00:00"
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.shelly_heizstab
    - service: notify.persistent_notification
      data:
        title: "Heizstab EIN"
        message: >
          Batterie {{ states('sensor.sn_XXXXXXXXXX_battery_soc_total') }}% —
          PV {{ states('sensor.pv_gesamtleistung') }} W →
          Heizstab eingeschaltet.
  mode: single

- id: heizstab_solar_aus
  alias: "Heizstab AUS bei Akku unter 80% oder wenig PV"
  description: >
    Schaltet Heizstab aus wenn Batterie unter 80% fällt oder PV unter 500W.
  trigger:
    - platform: numeric_state
      entity_id: sensor.sn_XXXXXXXXXX_battery_soc_total
      below: 80
      for:
        minutes: 2
    - platform: numeric_state
      entity_id: sensor.pv_gesamtleistung
      below: 500
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: input_boolean.heizstab_automation_aktiv
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.shelly_heizstab
    - service: notify.persistent_notification
      data:
        title: "Heizstab AUS"
        message: >
          Batterie {{ states('sensor.sn_XXXXXXXXXX_battery_soc_total') }}% —
          PV {{ states('sensor.pv_gesamtleistung') }} W →
          Heizstab ausgeschaltet.
  mode: single

- id: heizstab_abend_aus
  alias: "Heizstab AUS nach 19:00 Uhr"
  description: "Sicherstellt dass der Heizstab nach 19 Uhr immer aus ist."
  trigger:
    - platform: time
      at: "19:00:00"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.shelly_heizstab
  mode: single
