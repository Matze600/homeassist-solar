# ---------------------------------------------------------------------------
# Heizstab Phasensteuerung (3x Shelly Plus 1PM, L1/L2/L3)
# DEAKTIVIERT 2026-06-07 — Steuerung jetzt via SMA Ennexos (dynamische Tarife)
# Zum Reaktivieren: "- condition: template / value_template: '{{ false }}'" entfernen
# ---------------------------------------------------------------------------

- id: heizstab_phasensteuerung
  alias: "Heizstab Phasensteuerung (Solarüberschuss)"
  description: >
    Steuert 1–3 Phasen des Heizstabs je nach Solarüberschuss und Batterie-SOC.
    Läuft alle 2 Minuten zwischen 07:00 und 19:00 Uhr.
    Schwellen: >3500W→3Ph, >2000W→2Ph, >800W→1Ph, Batterie<80%→Aus
  trigger:
    - platform: time_pattern
      minutes: "/2"
  condition:
    - condition: template
      value_template: "{{ false }}"  # DISABLED: SMA Ennexos 2026-06-07
    - condition: state
      entity_id: input_boolean.heizstab_automation_aktiv
      state: "on"
    - condition: time
      after: "07:00:00"
      before: "19:00:00"
  action:
    - variables:
        ueberschuss: "{{ states('sensor.solar_ueberschuss') | float(0) }}"
        batterie: "{{ states('sensor.sma_battery_soc_total') | float(0) }}"
        aktuelle_phasen: "{{ states('input_number.heizstab_aktive_phasen') | int }}"
        ziel_phasen: >
          {% if batterie < 80 %}
            0
          {% elif ueberschuss > 3500 %}
            3
          {% elif ueberschuss > 2000 %}
            2
          {% elif ueberschuss > 800 %}
            1
          {% else %}
            0
          {% endif %}
    - if: "{{ ziel_phasen | int != aktuelle_phasen }}"
      then:
        - service: input_number.set_value
          target:
            entity_id: input_number.heizstab_rotation
          data:
            value: "{{ (states('input_number.heizstab_rotation') | int + 1) % 3 }}"
        - service: script.heizstab_phasen_schalten
          data:
            ziel_phasen: "{{ ziel_phasen | int }}"
        - service: notify.persistent_notification
          data:
            title: "Heizstab Phasen geändert"
            message: >
              {{ aktuelle_phasen }} → {{ ziel_phasen }} Phase(n) |
              PV: {{ states('sensor.pv_gesamtleistung') }} W |
              Überschuss: {{ ueberschuss | round(0) }} W |
              Batterie: {{ batterie | round(0) }}%
  mode: single

- id: heizstab_1phase_rotation
  alias: "Heizstab 1-Phasen Rotation (alle 30 Min)"
  description: "Rotiert die aktive Phase bei 1-Phasen-Betrieb für gleichmäßige Belastung des Heizstabs"
  trigger:
    - platform: time_pattern
      minutes: "/30"
  condition:
    - condition: template
      value_template: "{{ false }}"  # DISABLED: SMA Ennexos 2026-06-07
    - condition: state
      entity_id: input_boolean.heizstab_automation_aktiv
      state: "on"
    - condition: numeric_state
      entity_id: input_number.heizstab_aktive_phasen
      above: 0.5
      below: 1.5
    - condition: time
      after: "07:00:00"
      before: "19:00:00"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.heizstab_rotation
      data:
        value: "{{ (states('input_number.heizstab_rotation') | int + 1) % 3 }}"
    - service: script.heizstab_phasen_schalten
      data:
        ziel_phasen: 1
  mode: single

- id: heizstab_abend_aus
  alias: "Heizstab AUS nach 19:00 Uhr"
  description: "Alle Phasen nach 19 Uhr ausschalten"
  trigger:
    - platform: time
      at: "19:00:00"
  condition:
    - condition: template
      value_template: "{{ false }}"  # DISABLED: SMA Ennexos 2026-06-07
  action:
    - service: script.heizstab_phasen_schalten
      data:
        ziel_phasen: 0
  mode: single

- id: heizstab_automation_deaktiviert
  alias: "Heizstab AUS wenn Automation deaktiviert"
  description: "Alle Phasen sofort ausschalten wenn Automation manuell deaktiviert wird"
  trigger:
    - platform: state
      entity_id: input_boolean.heizstab_automation_aktiv
      to: "off"
  condition:
    - condition: template
      value_template: "{{ false }}"  # DISABLED: SMA Ennexos 2026-06-07
  action:
    - service: script.heizstab_phasen_schalten
      data:
        ziel_phasen: 0
  mode: single

# ---------------------------------------------------------------------------
# Batterie-Priorität bei Billigstrom (Awattar ≤ 0 ct/kWh)
# DEAKTIVIERT 2026-06-07 — Batterie + Heizstab jetzt via SMA Ennexos gesteuert
# Nur Wallboxen (lp1-3) verbleiben in evcc; lp4-6 Heizstab-Referenzen entfernt
# Zum Reaktivieren: "- condition: template / value_template: '{{ false }}'" entfernen
# ---------------------------------------------------------------------------

- id: batterie_prioritaet_an
  alias: "Batterie Priorität AN (Strompreis ≤ 0 ct/kWh)"
  description: >
    Stoppt Wallbox-Ladepunkte wenn Preis ≤ 0 ct, Batterie < 80%
    und PV > 500 W. PV-Strom fließt dann in die Batterie.
    (Heizstab lp4-6 entfernt — SMA Ennexos übernimmt)
  trigger:
    - platform: numeric_state
      entity_id: sensor.evcc_strompreis_aktuell
      below: 0.001
    - platform: numeric_state
      entity_id: sensor.sma_battery_soc_total
      below: 80
    - platform: numeric_state
      entity_id: sensor.pv_gesamtleistung
      above: 500
  condition:
    - condition: template
      value_template: "{{ false }}"  # DISABLED: SMA Ennexos 2026-06-07
    - condition: numeric_state
      entity_id: sensor.evcc_strompreis_aktuell
      below: 0.001
    - condition: numeric_state
      entity_id: sensor.sma_battery_soc_total
      below: 80
    - condition: numeric_state
      entity_id: sensor.pv_gesamtleistung
      above: 500
    - condition: state
      entity_id: input_boolean.batterie_prioritaet_aktiv
      state: "off"
  action:
    - service: rest_command.evcc_loadpoint_mode
      data:
        loadpoint: 1
        mode: "off"
    - service: rest_command.evcc_loadpoint_mode
      data:
        loadpoint: 2
        mode: "off"
    - service: rest_command.evcc_loadpoint_mode
      data:
        loadpoint: 3
        mode: "off"
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.batterie_prioritaet_aktiv
    - service: notify.persistent_notification
      data:
        title: "Batterie Priorität aktiv"
        message: >
          Wallboxen pausiert – PV fließt in Batterie.
          Preis: {{ states('sensor.evcc_strompreis_aktuell') | float | round(3) }} ct/kWh |
          Batterie: {{ states('sensor.sma_battery_soc_total') | int }}% |
          PV: {{ states('sensor.pv_gesamtleistung') | int }} W
  mode: single

- id: batterie_prioritaet_aus
  alias: "Batterie Priorität AUS (Preis > 0 ct oder Batterie ≥ 80% oder kein PV)"
  description: >
    Stellt Wallboxen auf PV-Modus zurück wenn Preis wieder > 0 ct,
    Batterie ≥ 80% oder PV unter 200 W fällt.
    (Heizstab lp4-6 entfernt — SMA Ennexos übernimmt)
  trigger:
    - platform: numeric_state
      entity_id: sensor.evcc_strompreis_aktuell
      above: 0.001
    - platform: numeric_state
      entity_id: sensor.sma_battery_soc_total
      above: 79.9
    - platform: numeric_state
      entity_id: sensor.pv_gesamtleistung
      below: 200
  condition:
    - condition: template
      value_template: "{{ false }}"  # DISABLED: SMA Ennexos 2026-06-07
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sensor.evcc_strompreis_aktuell
          above: 0.001
        - condition: numeric_state
          entity_id: sensor.sma_battery_soc_total
          above: 79.9
        - condition: numeric_state
          entity_id: sensor.pv_gesamtleistung
          below: 200
    - condition: state
      entity_id: input_boolean.batterie_prioritaet_aktiv
      state: "on"
  action:
    - service: rest_command.evcc_loadpoint_mode
      data:
        loadpoint: 1
        mode: "pv"
    - service: rest_command.evcc_loadpoint_mode
      data:
        loadpoint: 2
        mode: "pv"
    - service: rest_command.evcc_loadpoint_mode
      data:
        loadpoint: 3
        mode: "pv"
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.batterie_prioritaet_aktiv
    - service: notify.persistent_notification
      data:
        title: "Batterie Priorität beendet"
        message: >
          Wallboxen wieder auf PV-Modus.
          Preis: {{ states('sensor.evcc_strompreis_aktuell') | float | round(3) }} ct/kWh |
          Batterie: {{ states('sensor.sma_battery_soc_total') | int }}% |
          PV: {{ states('sensor.pv_gesamtleistung') | int }} W
  mode: single

# ---------------------------------------------------------------------------
# Alexa PV-Status Ansage
# Trigger: input_boolean.pv_status_anfrage geht auf "on"
# (wird über Alexa-Routine eingeschaltet)
# ---------------------------------------------------------------------------

- id: alexa_pv_status_ansage
  alias: "Alexa: PV Status Ansage"
  description: "Liest aktuelle Solarwerte vor wenn Alexa die Anfrage triggert"
  trigger:
    - platform: state
      entity_id: input_boolean.pv_status_anfrage
      to: "on"
  action:
    - service: notify.alexa_media
      data:
        target:
          - media_player.anni_2
          - media_player.mullers_echo_dot
          - media_player.mullers_echo_dot_3
          - media_player.kuche
          - media_player.mullers_echo_studio
        message: >
          Solarstatus: Gesamterzeugung {{ states('sensor.pv_gesamtleistung') | int }} Watt.
          {% if states('sensor.sma_battery_soc_total') | float(-1) >= 0 %}
          Batterieladung {{ states('sensor.sma_battery_soc_total') | int }} Prozent.
          {% endif %}
          {% set ueberschuss = states('sensor.solar_ueberschuss') | int %}
          {% if ueberschuss > 100 %}
          Solarüberschuss {{ ueberschuss }} Watt.
          {% else %}
          Kein Solarüberschuss.
          {% endif %}
          {% set grundlast = states('sensor.grundlast') | int %}
          {% if grundlast > 0 %}
          Netzbezug {{ grundlast }} Watt.
          {% else %}
          Kein Netzbezug.
          {% endif %}
        data:
          type: announce
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.pv_status_anfrage
  mode: single
