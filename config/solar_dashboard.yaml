title: Solar
views:
  - title: Übersicht
    path: solar-uebersicht
    icon: mdi:solar-power
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Hoymiles HMS-1600-4T"
          - type: gauge
            entity: sensor.wechselrichter_ac_leistung
            name: Aktuelle Leistung
            min: 0
            max: 1600
            severity:
              green: 800
              yellow: 400
              red: 0
          - type: glance
            show_name: true
            title: Tagesertrag pro Panel
            entities:
              - entity: sensor.wechselrichter_port_1_dc_tagesenergie
                name: Port 1
              - entity: sensor.wechselrichter_port_2_dc_tagesenergie
                name: Port 2
              - entity: sensor.wechselrichter_port_3_dc_tagesenergie
                name: Port 3
              - entity: sensor.wechselrichter_port_4_dc_tagesenergie
                name: Port 4
          - type: glance
            show_name: true
            title: Gesamtertrag pro Panel
            entities:
              - entity: sensor.wechselrichter_port_1_dc_gesamtenergie
                name: Port 1
              - entity: sensor.wechselrichter_port_2_dc_gesamtenergie
                name: Port 2
              - entity: sensor.wechselrichter_port_3_dc_gesamtenergie
                name: Port 3
              - entity: sensor.wechselrichter_port_4_dc_gesamtenergie
                name: Port 4
          - type: entities
            title: Details
            entities:
              - entity: sensor.wechselrichter_temperatur
                name: Temperatur
              - entity: sensor.wechselrichter_netzspannung
                name: Netzspannung
              - entity: sensor.wechselrichter_netzfrequenz
                name: Netzfrequenz

      - type: vertical-stack
        cards:
          - type: markdown
            content: "## SMA Wechselrichter"
          - type: gauge
            entity: sensor.sma_pv_power
            name: PV Leistung
            min: 0
            max: 5000
            severity:
              green: 2500
              yellow: 1000
              red: 0
          - type: entities
            title: Ertrag & Status
            entities:
              - entity: sensor.sma_daily_yield
                name: Tagesertrag
              - entity: sensor.sma_total_yield
                name: Gesamtertrag
              - entity: sensor.sma_grid_power
                name: Netzleistung
              - entity: sensor.sma_status
                name: Status

      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              # PV Gesamt: {{ (states('sensor.wechselrichter_ac_leistung') | float(0)
              + states('sensor.sma_pv_power') | float(0)) | round(0) }} W
          - type: gauge
            entity: sensor.wechselrichter_ac_leistung
            name: Gesamtleistung Hoymiles
            min: 0
            max: 1600
            needle: true
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.wechselrichter_port_1_dc_leistung
                name: Panel 1
                min: 0
                max: 400
              - type: gauge
                entity: sensor.wechselrichter_port_2_dc_leistung
                name: Panel 2
                min: 0
                max: 400
              - type: gauge
                entity: sensor.wechselrichter_port_3_dc_leistung
                name: Panel 3
                min: 0
                max: 400
              - type: gauge
                entity: sensor.wechselrichter_port_4_dc_leistung
                name: Panel 4
                min: 0
                max: 400

  - title: Energie & Heizstab
    path: solar-energie
    icon: mdi:lightning-bolt
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Energiefluss"
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.pv_gesamtleistung
                name: PV Gesamt
                min: 0
                max: 12000
                severity:
                  green: 5000
                  yellow: 2000
                  red: 0
              - type: gauge
                entity: sensor.sma_battery_soc_total
                name: Batterie
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 40
                  red: 0
              - type: gauge
                entity: sensor.solar_ueberschuss
                name: Überschuss
                min: 0
                max: 10000
                severity:
                  green: 2000
                  yellow: 800
                  red: 0
              - type: gauge
                entity: sensor.grundlast
                name: Grundlast
                min: 0
                max: 3000
                severity:
                  green: 0
                  yellow: 500
                  red: 1500
          - type: entities
            title: Leistung im Detail
            entities:
              - entity: sensor.pv_gesamtleistung
                name: PV Gesamtleistung
                icon: mdi:solar-power
              - entity: sensor.grundlast
                name: Grundlast (Netzbezug L1)
                icon: mdi:home-import-outline
              - entity: sensor.solar_ueberschuss
                name: Solarüberschuss
                icon: mdi:transmission-tower-export
              - entity: sensor.sma_battery_soc_total
                name: Batterie SOC
                icon: mdi:battery
              - entity: sensor.sma_grid_power
                name: Netzleistung (SMA)
                icon: mdi:transmission-tower

      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Heizstab Status (gesteuert durch SMA)"
          - type: entities
            title: Phasen L1 / L2 / L3
            entities:
              - entity: switch.heizstab_l1
                name: Heizstab L1
                icon: mdi:water-boiler
              - entity: sensor.heizstab_l1_leistung
                name: L1 Leistung
                icon: mdi:lightning-bolt
              - entity: switch.heizstab_l2
                name: Heizstab L2
                icon: mdi:water-boiler
              - entity: sensor.heizstab_l2_leistung
                name: L2 Leistung
                icon: mdi:lightning-bolt
              - entity: switch.heizstab_l3
                name: Heizstab L3
                icon: mdi:water-boiler
              - entity: sensor.heizstab_l3_leistung
                name: L3 Leistung
                icon: mdi:lightning-bolt
