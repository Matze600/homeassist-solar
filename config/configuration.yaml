
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Berechnete Solar-Sensoren
template:
  - sensor:
      - name: "PV Gesamtleistung"
        unique_id: pv_gesamtleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.wechselrichter_ac_leistung') | float(0)
            + states('sensor.sma_pv_power') | float(0)) | round(0) }}

      - name: "Grundlast"
        unique_id: grundlast
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-import-outline
        state: >
          {{ states('sensor.sma_metering_active_power_draw_l1') | float(0) | round(0) }}

      - name: "Solarüberschuss"
        unique_id: solar_ueberschuss
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {{ [states('sensor.pv_gesamtleistung') | float(0) -
              states('sensor.grundlast') | float(0), 0] | max | round(0) }}

      - name: "Netzleistung"
        unique_id: netzleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower
        state: >
          {{ (states('sensor.sma_metering_power_absorbed') | float(0)
            - states('sensor.sma_metering_power_supplied') | float(0)) | round(0) }}

      - name: "Batterieleistung"
        unique_id: batterieleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        state: >
          {{ (states('sensor.sma_battery_power_charge_total') | float(0)
            - states('sensor.sma_battery_power_discharge_total') | float(0)) | round(0) }}

# Alexa-Trigger + Statusvariablen
input_boolean:
  # heizstab_automation_aktiv: DEAKTIVIERT 2026-06-07 — SMA Ennexos übernimmt
  # Referenz noch in automations.yaml (disabled) — bei Reaktivierung wieder einkommentieren
  # heizstab_automation_aktiv:
  #   name: Heizstab Solar-Automation
  #   icon: mdi:water-boiler-auto
  pv_status_anfrage:
    name: Alexa PV-Status Anfrage
    icon: mdi:solar-power
  batterie_prioritaet_aktiv:
    name: Batterie Priorität aktiv
    icon: mdi:battery-charging-high

# input_number Heizstab: DEAKTIVIERT 2026-06-07 — nur für HA-Phasensteuerung benötigt
