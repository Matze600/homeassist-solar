
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Berechnete Solar-Sensoren
template:
  - sensor:
      - name: "PV Gesamtleistung"
        unique_id: pv_gesamtleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.wechselrichter_ac_leistung') | float(0)
            + states('sensor.sma_pv_power') | float(0)) | round(0) }}

      - name: "Grundlast"
        unique_id: grundlast
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-import-outline
        state: >
          {{ states('sensor.sma_metering_active_power_draw_l1') | float(0) | round(0) }}

      - name: "Solarüberschuss"
        unique_id: solar_ueberschuss
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {{ [states('sensor.pv_gesamtleistung') | float(0) -
              states('sensor.grundlast') | float(0), 0] | max | round(0) }}

# Manuelle Steuerung Heizstab-Automation
input_boolean:
  heizstab_automation_aktiv:
    name: Heizstab Solar-Automation
    icon: mdi:water-boiler-auto

input_number:
  heizstab_rotation:
    name: Heizstab Rotationsindex
    min: 0
    max: 2
    step: 1
    mode: box
    icon: mdi:rotate-right
  heizstab_aktive_phasen:
    name: Heizstab aktive Phasen
    min: 0
    max: 3
    step: 1
    mode: box
    icon: mdi:sine-wave

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.178.0/24
      allow_bypass_login: true
    - type: homeassistant

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
