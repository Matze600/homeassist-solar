# evcc REST-Sensor: aktueller Strompreis aus Awattar-Tarif
sensor:
  - platform: rest
    name: "evcc Strompreis aktuell"
    unique_id: evcc_tariff_grid
    resource: "http://localhost:7070/api/state"
    scan_interval: 60
    value_template: "{{ value_json.tariffGrid | round(4) }}"
    unit_of_measurement: "ct/kWh"

# evcc Loadpoint-Modus setzen (POST /api/loadpoints/{loadpoint}/mode/{mode})
rest_command:
  evcc_loadpoint_mode:
    url: "http://localhost:7070/api/loadpoints/{{ loadpoint }}/mode/{{ mode }}"
    method: POST

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.1.0/24  # LAN-Subnetz anpassen
      allow_bypass_login: true
    - type: homeassistant

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
